name: CI

on:
  push:
    branches: [main, "refactor/**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-groups --frozen

      - name: Ruff (lint new/changed modules)
        # The legacy tree has ~4k pre-existing violations (paid down over later
        # phases). Enforce the standard on Phase 0/1 code now; add paths as the
        # cleanup progresses.
        run: |
          uv run ruff check \
            app/services/assessment_grading.py \
            app/services/assessment_store.py \
            app/models/question_instance.py \
            app/core/rate_limit.py \
            alembic/env.py \
            tests/

      - name: Pytest
        # Tests spin up Postgres via testcontainers; the GitHub runner ships a
        # working Docker daemon, so no `services:` block is needed.
        env:
          RATE_LIMIT_ENABLED: "false"
          ENVIRONMENT: development
          LANGFUSE_ENABLED: "false"
        run: uv run pytest -q

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck + build
        run: npm run build

  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json
      - run: npm ci
      - name: TypeScript check
        # The legacy app has known pre-existing type errors (it is replaced by a
        # fresh SDK 57 app in Phase 3); do not fail the build on them yet.
        run: npx tsc --noEmit || true

  secrets-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
